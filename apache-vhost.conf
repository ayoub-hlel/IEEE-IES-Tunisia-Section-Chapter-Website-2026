# ============================================================================
# Apache Virtual Host Configuration for ies.ieee.tn
# ============================================================================
# Place this file in: /etc/apache2/sites-available/ies.ieee.tn.conf
# Enable with: sudo a2ensite ies.ieee.tn.conf
# Restart: sudo systemctl restart apache2
# ============================================================================

# HTTPS Virtual Host
<VirtualHost *:443>
    ServerName ies.ieee.tn
    DocumentRoot /var/www/ies.ieee.tn

    <Directory /var/www/ies.ieee.tn>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ── Compression ──────────────────────────────────────────────────────
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/css application/javascript application/json image/svg+xml application/xml
    </IfModule>

    # ── Cache Headers ────────────────────────────────────────────────────
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType text/html "access plus 2 hours"
        ExpiresByType text/css "access plus 2 hours"
        ExpiresByType application/javascript "access plus 2 hours"
        ExpiresByType application/json "access plus 2 hours"
        ExpiresByType font/woff2 "access plus 1 year"
        ExpiresByType font/woff "access plus 1 year"
        ExpiresByType image/webp "access plus 1 month"
        ExpiresByType image/png "access plus 1 month"
        ExpiresByType image/jpeg "access plus 1 month"
        ExpiresByType image/svg+xml "access plus 1 month"
        ExpiresByType image/x-icon "access plus 1 month"
    </IfModule>

    # ── Security Headers ─────────────────────────────────────────────────
    <IfModule mod_headers.c>
        # HSTS - Force HTTPS
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
        # Prevent MIME sniffing
        Header always set X-Content-Type-Options "nosniff"
        # Clickjacking protection
        Header always set X-Frame-Options "SAMEORIGIN"
        # Referrer policy
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
        # XSS protection (legacy browsers)
        Header always set X-XSS-Protection "1; mode=block"
        # Permissions policy
        Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"
        # Content Security Policy (for static site — allows only self + trusted CDNs)
        Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://utfs.io; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; img-src 'self' data: https://ieee.tn https://utfs.io https://ieeexplore.ieee.org; font-src 'self' data:; connect-src 'self' https://utfs.io; frame-ancestors 'self'; base-uri 'self'; form-action 'self';"
    </IfModule>

    # ── SSL Configuration ────────────────────────────────────────────────
    SSLEngine on
    # Option A: Let's Encrypt (recommended)
    SSLCertificateFile /etc/letsencrypt/live/ies.ieee.tn/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/ies.ieee.tn/privkey.pem

    # ── Logging ──────────────────────────────────────────────────────────
    ErrorLog ${APACHE_LOG_DIR}/ies.ieee.tn-error.log
    CustomLog ${APACHE_LOG_DIR}/ies.ieee.tn-access.log combined
</VirtualHost>

# ── HTTP to HTTPS Redirect ───────────────────────────────────────────────
<VirtualHost *:80>
    ServerName ies.ieee.tn
    Redirect permanent / https://ies.ieee.tn/
</VirtualHost>

# ── Apache Modules Required ──────────────────────────────────────────────
# Enable with: sudo a2enmod ssl deflate expires headers rewrite
#
# mod_ssl       - HTTPS/SSL support
# mod_deflate   - gzip compression
# mod_expires   - Cache-Control headers
# mod_headers   - Custom security headers
# mod_rewrite   - URL rewriting (for redirects)
